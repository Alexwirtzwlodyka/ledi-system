name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run backend tests
        run: php backend-laravel/tests/run_project_tests.php

      - name: Install frontend dependencies
        working-directory: frontend-react
        run: npm install

      - name: Run frontend tests
        run: node frontend-react/tests/project_contracts.test.mjs
